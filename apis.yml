apis:
- name: Bloomberg EMSX Trading API
  description: >-
    API for order creation, routing, management and execution monitoring
    through Bloomberg EMSX platform. Supports order lifecycle management,
    broker selection, route management, fill tracking, and real-time
    execution notifications for equity, fixed income, futures, and options
    trading.

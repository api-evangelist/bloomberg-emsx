naftiko: 1.0.0-alpha2
info:
  label: Bloomberg EMSX Trading API — Brokers
  description: 'Bloomberg EMSX Trading API — Brokers. 2 operations. Lead operation: Bloomberg EMSX List available brokers.
    Self-contained Naftiko capability covering one Bloomberg Emsx business surface.'
  tags:
  - Bloomberg Emsx
  - Brokers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_EMSX_API_KEY: BLOOMBERG_EMSX_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-brokers
    baseUri: https://api.bloomberg.com/emsxapi/v1
    description: Bloomberg EMSX Trading API — Brokers business capability. Self-contained, no shared references.
    resources:
    - name: brokers
      path: /brokers
      operations:
      - name: listbrokers
        method: GET
        description: Bloomberg EMSX List available brokers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assetClass
          in: query
          type: string
          description: Filter brokers by asset class
        - name: ticker
          in: query
          type: string
          description: Bloomberg ticker to find brokers available for a specific security
    - name: brokers-brokerCode-strategies
      path: /brokers/{brokerCode}/strategies
      operations:
      - name: listbrokerstrategies
        method: GET
        description: Bloomberg EMSX List broker strategies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: brokerCode
          in: path
          type: string
          description: Bloomberg broker code
          required: true
        - name: assetClass
          in: query
          type: string
          description: Filter strategies by asset class
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_EMSX_API_KEY}}'
  exposes:
  - type: rest
    namespace: trading-brokers-rest
    port: 8080
    description: REST adapter for Bloomberg EMSX Trading API — Brokers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/brokers
      name: brokers
      description: REST surface for brokers.
      operations:
      - method: GET
        name: listbrokers
        description: Bloomberg EMSX List available brokers
        call: trading-brokers.listbrokers
        with:
          assetClass: rest.assetClass
          ticker: rest.ticker
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/brokers/{brokercode}/strategies
      name: brokers-brokercode-strategies
      description: REST surface for brokers-brokerCode-strategies.
      operations:
      - method: GET
        name: listbrokerstrategies
        description: Bloomberg EMSX List broker strategies
        call: trading-brokers.listbrokerstrategies
        with:
          brokerCode: rest.brokerCode
          assetClass: rest.assetClass
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-brokers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg EMSX Trading API — Brokers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bloomberg-emsx-list-available-brokers
      description: Bloomberg EMSX List available brokers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-brokers.listbrokers
      with:
        assetClass: tools.assetClass
        ticker: tools.ticker
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-emsx-list-broker-strategies
      description: Bloomberg EMSX List broker strategies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-brokers.listbrokerstrategies
      with:
        brokerCode: tools.brokerCode
        assetClass: tools.assetClass
      outputParameters:
      - type: object
        mapping: $.

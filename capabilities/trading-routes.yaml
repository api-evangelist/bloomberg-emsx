naftiko: 1.0.0-alpha2
info:
  label: Bloomberg EMSX Trading API — Routes
  description: 'Bloomberg EMSX Trading API — Routes. 5 operations. Lead operation: Bloomberg EMSX List routes. Self-contained
    Naftiko capability covering one Bloomberg Emsx business surface.'
  tags:
  - Bloomberg Emsx
  - Routes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_EMSX_API_KEY: BLOOMBERG_EMSX_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-routes
    baseUri: https://api.bloomberg.com/emsxapi/v1
    description: Bloomberg EMSX Trading API — Routes business capability. Self-contained, no shared references.
    resources:
    - name: routes
      path: /routes
      operations:
      - name: listroutes
        method: GET
        description: Bloomberg EMSX List routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter routes by status
        - name: broker
          in: query
          type: string
          description: Filter by broker code
        - name: orderSequenceNumber
          in: query
          type: integer
          description: Filter routes by parent order sequence number
        - name: limit
          in: query
          type: integer
          description: Maximum number of routes to return
        - name: offset
          in: query
          type: integer
          description: Number of routes to skip for pagination
    - name: routes-manualFill
      path: /routes/manualFill
      operations:
      - name: createmanualfill
        method: POST
        description: Bloomberg EMSX Create a manual fill
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: routes-routeId
      path: /routes/{routeId}
      operations:
      - name: getroute
        method: GET
        description: Bloomberg EMSX Get route details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: modifyroute
        method: PATCH
        description: Bloomberg EMSX Modify an existing route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: cancelroute
        method: DELETE
        description: Bloomberg EMSX Cancel a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.BLOOMBERG_EMSX_API_KEY}}'
  exposes:
  - type: rest
    namespace: trading-routes-rest
    port: 8080
    description: REST adapter for Bloomberg EMSX Trading API — Routes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/routes
      name: routes
      description: REST surface for routes.
      operations:
      - method: GET
        name: listroutes
        description: Bloomberg EMSX List routes
        call: trading-routes.listroutes
        with:
          status: rest.status
          broker: rest.broker
          orderSequenceNumber: rest.orderSequenceNumber
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/routes/manualfill
      name: routes-manualfill
      description: REST surface for routes-manualFill.
      operations:
      - method: POST
        name: createmanualfill
        description: Bloomberg EMSX Create a manual fill
        call: trading-routes.createmanualfill
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/routes/{routeid}
      name: routes-routeid
      description: REST surface for routes-routeId.
      operations:
      - method: GET
        name: getroute
        description: Bloomberg EMSX Get route details
        call: trading-routes.getroute
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: modifyroute
        description: Bloomberg EMSX Modify an existing route
        call: trading-routes.modifyroute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelroute
        description: Bloomberg EMSX Cancel a route
        call: trading-routes.cancelroute
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-routes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg EMSX Trading API — Routes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bloomberg-emsx-list-routes
      description: Bloomberg EMSX List routes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-routes.listroutes
      with:
        status: tools.status
        broker: tools.broker
        orderSequenceNumber: tools.orderSequenceNumber
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-emsx-create-manual-fill
      description: Bloomberg EMSX Create a manual fill
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-routes.createmanualfill
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-emsx-get-route-details
      description: Bloomberg EMSX Get route details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-routes.getroute
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-emsx-modify-existing-route
      description: Bloomberg EMSX Modify an existing route
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: trading-routes.modifyroute
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bloomberg-emsx-cancel-route
      description: Bloomberg EMSX Cancel a route
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: trading-routes.cancelroute
      outputParameters:
      - type: object
        mapping: $.
